<html>
    <head>
        <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1, maximum-scale=1, user-scalable=no">
        <link rel="shortcut icon" href="/static/favicon.png" type="image/x-icon">
        <title>Anjoovi</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.0/css/all.min.css">
        <style>
html,body{
    margin:0px;
}
#logo{
    position:absolute;
    background:white;
    width:12.5%;
    height:10%;
    top:-1%;
    left:7%;
    /* top:5%;
    left:10%; */
}
#bt-menu{
    position:absolute;
    background:white;
    width:2%;
    height:2.5%;
    top:3%;
    left:3.5%;
}
#b1,#b2,#b3{
    position:absolute;
    background:black;
    width:100%;
    height:2.5%;
    border-radius:20px;
}
#b1{
    margin-top:0px;
}
#b2{
    margin-top:35%;
}
#b3{
    margin-top:70%;
} 
#c_menu{
    position:absolute;
    background:#f0f0f0;
    height:90%;
    top:10%;
    transition:width 1s;
}
#menu{
    position:relative;
    background:white;
    width:calc(100% - 4px);
    height:100%;
    border-right: solid 4px rgba(100,100,100,0.2);
} 
#c_menu.fechado{
    width:0%;
}   
#c_menu.aberto{
    width:25%;
}
#menu.fechado{
    display:none;
}
#menu.aberto{
    display:block;
}
.i-menu{
    padding-left:10%;
    position:relative;
    background:white;
    width:90%;
    display:flex;
    align-items: center;
    height:7.5%;
    border-bottom:solid 1px rgba(100,100,100,0.2);
    border-radius:20px;
}
.i-menu:hover{
    background:rgba(100,100,100,0.2);
}
/* .i-menu2{
    background:rgba(128, 128, 128,0.1);
    border-bottom:solid 1px rgba(100,100,100,0.2);
} */
.i-menu a{
    color:black;
    font-family:Arial;
    text-decoration: none;
}
.i-menu-1{
    top:0.75px;
    border-top:solid 1px rgba(100,100,100,0.2);
}
#lupa{
    position:absolute;
    background:white;
    top:3.5%;
    left:90%;
    width:3vh;
    height:3vh;
}
        </style>
    </head>
    <body>
        <a href="/"><img id="logo" src="../static/logo-anjoovi.png"></a>
        <div id="bt-menu">
            <div id="b1"></div>
            <div id="b2"></div>
            <div id="b3"></div>
        </div>
        <div id="c_menu" class="fechado">
            <div id="menu" class="fechado">
                <div class="i-menu-1 i-menu" ><a href="/noticias-lista">Últimas notícias</a></div>
                <div class="i-menu i-menu2" ><a href="/editoriais">Editoriais</a></div>
                <div class="i-menu" ><a href="/blogs-e-colunas">Blogs & Colunas</a></div>
                <div class="i-menu i-menu2" ><a href="/paginas">Páginas</a></div>
                <div class="i-menu" ><a href="/classificados">Classificados</a></div>
                <div class="i-menu i-menu2" ><a href="/contato">Fale conosco</a></div>
            </div>
        </div>
        <script src="../static/index.js"></script>
        <img id="lupa" src="../static/imagem-lupa.png">
    </body>
</html>
