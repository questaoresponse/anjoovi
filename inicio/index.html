<html>
    <head>
        <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1, maximum-scale=1, user-scalable=no">
        <link rel="shortcut icon" href="/static/favicon.png" type="image/x-icon">
        <title>Anjoovi</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.0/css/all.min.css">
        <style>
html,body{
    margin:0px;
}
#logo{
    position:absolute;
    background:white;
    width:12.5%;
    height:10vh;
    top:-1%;
    left:7%;
    /* top:5%;
    left:10%; */
}
#bt-menu{
    position:absolute;
    background:white;
    width:2%;
    height:2.5vh;
    top:3vh;
    left:3.5%;
}
#b1,#b2,#b3{
    position:absolute;
    background:black;
    width:100%;
    height:2.5%;
    border-radius:20px;
}
#b1{
    margin-top:0px;
}
#b2{
    margin-top:35%;
}
#b3{
    margin-top:70%;
} 
#c_menu{
    font-size:120%;
    position:absolute;
    background:white;
    border-right:solid 5px gray;
    width:25%;
    height:90vh;
    top:10vh;
}
#menu{
    position:relative;
    background:white;
    width:calc(100% - 4px);
    height:100%;
    border-right: solid 4px rgba(100,100,100,0.2);
} 
#c_menu.fechado{
    display:none;
}   
#c_menu.aberto{
    display:block;
}
.i-menu{
    text-decoration: none;
    padding-left:10%;
    position:relative;
    background:white;
    width:90%;
    display:flex;
    align-items: center;
    height:7.5%;
    border-bottom:solid 1px rgba(100,100,100,0.2);
    border-radius:20px;
}
.i-menu:hover{
    background:rgba(100,100,100,0.2);
}
/* .i-menu2{
    background:rgba(128, 128, 128,0.1);
    border-bottom:solid 1px rgba(100,100,100,0.2);
} */
.i-menu a{
    color:black;
    font-family:Arial;
    text-decoration: none;
}
.i-menu-1{
    top:0.75px;
    border-top:solid 1px rgba(100,100,100,0.2);
}
#logado{
    position:absolute;
    background:black;
    color:white;
    font-family: Arial;
    display:flex;
    justify-content: center;
    text-align: center;
    align-items: center;
    border-radius: 50%;
    top:3.5vh;
    left:90%;
    width:5vh;
    height:5vh;
}
:root{
    --p:10%;
}
#pesquisa{
    font-size:110%;
    position:absolute;
    background:white;
    top:2.5vh;
    height:5vh;
    border-top-left-radius: 100px;
    border-bottom-left-radius: 100px;
    border-top-right-radius: 100px;
    border-bottom-right-radius: 100px;
    padding-left: 3vw;
    width:32vw;
    left:35vw;
    background-size: 300px 300px;
}
#pl{
    position:absolute;
    background:rgba(0,0,0,0);
    width:4vh;
    height:4vh;
    border-radius: 50%;
    left:62.5vw;
    /* display:none; */
}
#pl img{
    position: absolute;
    background-color: rgba(0,0,0,0);
    top:0.75vh;
    width:100%;
    height:100%;
}
.a-l{
    color:black;
    text-decoration: none;
}
.a-l:hover{
    text-decoration: underline;
}
#login{
    font-family: Arial;
    font-size: 110%;
    position: absolute;
    display:none;
    color:white;
    background: black;
    justify-content: center;
    align-items: center;
    text-align: center;
    top:2.5vh;
    left:80%;
    width:10%;
    height:5vh;
    border:solid 1px black;
    border-radius:5px;
}
#login:hover{
    background:white;
    color:black;
}
.menu-fechado{
    opacity: 0;
    display:none;
}
.menu-aberto{
    opacity: 0.5;
    display:block;
}
#menu-a{
    position:absolute;
    background:gray;
    top:0%;
    left:25%;
    width:75%;
    height:100vh;
}
/* .l-l{
    text-decoration-color: none;
    text-decoration: none;
}
.l-l:hover{
    color:black;
} */
#cb{
    position:fixed;
    background:white;
    overflow-y:visible;
    width:100%;
    height:10%;
}
        </style>
    </head>
    <body>
        <div id="cb">
            <a href="/"><img id="logo" src="/static/logo-anjoovi.png"></a>
            <div id="bt-menu">
                <div id="b1"></div>
                <div id="b2"></div>
                <div id="b3"></div>
            </div>
            <div id="c_menu" class="fechado">
                <a class="a-l" href="/noticias-lista"><div class="i-menu-1 i-menu" >Últimas notícias</div></a>
                <a class="a-l" href="/editorias"><div class="i-menu i-menu2" >Editoriais</div></a>
                <a class="a-l" href="/blogs-e-colunas"><div class="i-menu" >Blogs & Colunas</div></a>
                <a class="a-l" href="/paginas"><div class="i-menu i-menu2" >Páginas</div></a>
                <a class="a-l" href="/classificados"><div class="i-menu" >Classificados</div></a>
                <a class="a-l" href="/contato"><div class="i-menu i-menu2" >Fale conosco</div></a>
            </div>
            <script src="/static/index.js"></script>
            <form id="fp">
                <input  id="pesquisa" class="fechado" placeholder="Pesquisar">
            </form>
            <div id="pl">
                <img src="/static/imagem-lupa.png">
            </div>
            <a class="l-l" href="/admin"><div id="login">Fazer login</div></a>
            <a href="/admin"><div id="logado"></div></a>
            <div id="menu-a" class="menu-fechado"></div>
        </div>
        <script src="https://code.jquery.com/jquery-3.6.3.min.js" integrity="sha256-pvPw+upLPUjgMXY0G+8O0xUf+/Im1MZjXxxgOcBQBXU=" crossorigin="anonymous"></script>
        <script>
var p=document.querySelector("#pesquisa");
var pl=document.querySelector("#pl");
var fp=document.querySelector("#fp");
var x="/static/x.jpg";
var l="/static/imagem-lupa.png"
fp.addEventListener("submit",(e)=>{
    e.preventDefault();
    var i=p.value;
    var i=encodeURIComponent(i);
    window.location.href="/busca/?q="+i.replace(/%20/g,"+");
})
p.addEventListener("input",()=>{
    if (p.value!=""){
        pl.querySelector("img").src=x;
    } else {
        pl.querySelector("img").src=l;
    }
})
if (!window.isLogado){
    document.querySelector("#login").style.display="flex";
    document.querySelector("#logado").style.display="none";
} else{
    document.querySelector("#logado").textContent=window.usuario[0];
    document.querySelector("#login").style.display="none";
    document.querySelector("#logado").style.display="flex";
}
        </script>
    </body>
</html>
