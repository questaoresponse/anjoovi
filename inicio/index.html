html,body{
    margin:0px;
}
#logo{
    position:absolute;
    background:white;
    width:12.5%;

    left:7%;

#bt-menu{
    position:absolute;

}

}
#b1{

}
#b2{

#b3{

    position:absolute;
    background:#f0f0f0;

#menu{
    position:relative;

} 
#c_menu.fechado{

#c_menu.aberto{

#menu.fechado{

}
#menu.aberto{
    display:block;
}
.i-menu{
    padding-left:10%;

    background:white;
    width:90%;

    align-items: center;
    height:7.5%;
    border-bottom:solid 1px rgba(100,100,100,0.2);
    border-radius:20px;
}
.i-menu:hover{
    background:rgba(100,100,100,0.2);

#lupa{
    position:absolute;
    background:white;

    left:90%;
    width:3vh;
    height:3vh;
}

    --p:10%;
}
#pesquisa{
    font-size:110%;
    position:absolute;
    background:white;
    top:2.5vh;
    height:5vh;
    border-top-left-radius: 100px;
    border-bottom-left-radius: 100px;
    border-top-right-radius: 100px;
    border-bottom-right-radius: 100px;
    padding-left: 5vw;
    width:30vw;
    left:32.5vw;
    background-size: 300px 300px;
}
#pl{
    position:absolute;
    background:rgba(0,0,0,0);
    width:2.5vw;
    height:2.5vw;
    border-radius: 50%;
    /* display:none; */
}
#pl img{
    position: absolute;
    background-color: rgba(0,0,0,0);
    top:1.75vw;
    left:34vw;
    width:100%;
    height:100%;
}
