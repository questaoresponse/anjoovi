<html>
    <head>
        <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1, maximum-scale=1, user-scalable=no">
        <link rel="shortcut icon" href="/static/favicon.png" type="image/x-icon">
        <title>Painel - Anjoovi</title>
        <style>
html,body{
    margin:0px;
    width:100%;
    height:100%;
    background:white;
}
#tabela{
    position:relative;
    background:white;
    top:20%;
    left:10%;
    width:80%;
    overflow-x: auto;
}
.coluna{
    position:relative;
    background: white;
    color:black;
    display:inline-flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    width:18%;
    height:100%;
}
.linha .coluna{
    padding-left:3%;
    width:15%;
    justify-content: normal;
}
.id{
    width:10%;
    border-left:solid 1px black;
    border-right:solid 1px black;
}
.linha .id{
    width:7%;
}
.titulo{
    text-decoration: none;
    color:black;
}
a.titulo:hover{
    text-decoration: underline;
}
.titulo,.linha .categoria,.line .div-categoria,.usuario,.acessos,.opcoes{
    border-right:solid 1px black;
}
.edit{
    margin-left:3%;
    top:10%;
    width:4%;
    height:50%;
}
.edit:hover{
    opacity:0.5;
}
.excluir{
    top:10%;
    width:4%;
    height:50%;
}
.excluir:hover{
    opacity:0.5;
}
.registros,.linha,.line{
    min-width:800px;
}
.linha,.line{
    font-family:Arial;
    position:relative;
    background:white;
    width:calc(100% - 3px);
    height:5vh;
    border:solid 1px black;
}
.linha .coluna{
    font-weight:900;
}
.linha .categoria{
    display:inline-flex;
}
.line .categoria{
    display:none;
}
.linha .div-categoria{
    display:none;
}
.line .div-categoria{
    display:inline-flex;
    top:-1px;
}
.line .div-categoria span{
    position:relative;
    background:black;
    color:white;
    border-radius:5px;
    width:80%;
    height:60%;
}
.coluna.opcoes{
    width:9.8%;
    border-right:0px;
}
.registros{
    position:relative;
    background:white;
    width:calc(100% - 1px);
    height:4vh;
    padding-top:1vh;
}
        </style>
    </head>
    <body>
        <div id="tabela">
            <div class="registros"></div>
            <div class="linha">
                <div class="coluna id">ID</div>
                <a class="coluna titulo">TITULO</a>
                <div class="coluna categoria">CATEGORIA</div>
                <div class="coluna div-categoria">
                    <span>ai</span>
                </div>
                <div class="coluna usuario">USUÁRIO</div>
                <div class="coluna acessos">ACESSOS</div>
                <img class="coluna edit" src="../static/edit-icone.png">
                <img class="coluna excluir" src="../static/remove-icone.png">
            </div>
        </div>
        <script src="https://code.jquery.com/jquery-3.6.3.min.js" integrity="sha256-pvPw+upLPUjgMXY0G+8O0xUf+/Im1MZjXxxgOcBQBXU=" crossorigin="anonymous"></script>
        <script>
var posts=window.noticias;
console.log(posts);
console.log(posts.length);
var tabela=document.querySelector("#tabela");
var l=document.querySelector(".linha");
var l2=l.cloneNode(true);
window.l=l;
window.l2=l2;
window.tabela=tabela;
l.querySelector(".edit").remove();
l.querySelector(".excluir").remove();
//l.querySelector(".categoria").remove();
//l.querySelector(".registros").remove();
var d=document.createElement("div");
d.className="coluna titulo";
d.textContent="TÍTULO";
l.querySelector(".titulo").parentNode.replaceChild(d,l.querySelector(".titulo"));
var o=document.createElement("div");
o.textContent="AÇÕES";
o.classList.add("coluna");
o.classList.add("opcoes");
l.appendChild(o);
function definir_tabela(posts,l){
    tabela.querySelector(".registros").textContent=posts.length>=0 && posts.length<=1 ? `Foi encontrado ${posts.length} registro.` : `Foram encontrados ${posts.length} registros.`;
    for (post of posts){
        var c=window.l2.cloneNode(true);
        c.className="line";
        var id=c.querySelector(".id");
        var titulo=c.querySelector(".titulo");
        var categoria=c.querySelector(".div-categoria span");
        var usuario=c.querySelector(".usuario");
        var acessos=c.querySelector(".acessos");
        var editar=c.querySelector(".edit");
        var excluir=c.querySelector(".excluir");
        id.textContent=post.id;
        titulo.textContent=post.titulo;
        titulo.onclick=()=>{
            window.open("/noticia/"+post.id+"/"+titulo);
        }
        categoria.textContent=post.categoria;
        usuario.textContent=post.usuario;
        acessos.textContent=post.acessos;
        tabela.appendChild(c);
        editar.addEventListener("click",()=>{window.location.href="/admin/noticias_edit/"+post.id})
        excluir.addEventListener("click",()=>{
        var r=window.confirm("Deseja remover este registro? O item será enviado à lixeira.");
        if (r){
            $.ajax({
                url: "/post/posts.php",
                type:'POST',
                data:{type:"delete",id:post.id},
                success: function(data) {
                    for (e of document.querySelectorAll(".line")){
                        e.remove();
                    }
                    data=JSON.parse(data);
                    definir_tabela(data,l);
                }
            });
        }
        })
    }
}
definir_tabela(posts,l);

    </script>
    </body>
</html>
