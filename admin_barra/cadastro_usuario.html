<html>
    <head>
        <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1, maximum-scale=1, user-scalable=no">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.0/css/all.min.css">
        <style>
html,body{
    margin:0px;
}
#logo{
    position:absolute;
    background:white;
    width:12.5%;
    height:10%;
    top:-1%;
    left:7%;
    /* top:5%;
    left:10%; */
}
#bt-menu{
    position:absolute;
    background:white;
    width:2%;
    height:2.5%;
    top:3%;
    left:3.5%;
}
#b1,#b2,#b3{
    position:absolute;
    background:black;
    width:100%;
    height:2.5%;
    border-radius:20px;
}
#b1{
    margin-top:0px;
}
#b2{
    margin-top:35%;
}
#b3{
    margin-top:70%;
} 
#c_menu{
    position:absolute;
    background:#f0f0f0;
    height:90%;
    top:10%;
    transition:width 0.5s;
}
#menu{
    position:relative;
    background:white;
    width:calc(100% - 4px);
    height:100%;
    border-right: solid 4px rgba(100,100,100,0.2);
} 
#c_menu.fechado{
    width:0%;
}   
#c_menu.aberto{
    width:25%;
}
#menu.fechado{
    display:none;
}
#menu.aberto{
    display:block;
}
.i-menu{
    padding-left:10%;
    position:relative;
    background:white;
    width:90%;
    display:flex;
    align-items: center;
    height:7.5%;
    border-bottom:solid 1px rgba(100,100,100,0.2);
    border-radius:20px;
}
.i-menu:hover{
    background:rgba(100,100,100,0.2);
}
/* .i-menu2{
    background:rgba(128, 128, 128,0.1);
    border-bottom:solid 1px rgba(100,100,100,0.2);
} */
.i-menu-1{
    top:0.75px;
    border-top:solid 1px rgba(100,100,100,0.2);
}
#lupa{
    position:absolute;
    background:white;
    top:3.5%;
    left:90%;
    width:3vh;
    height:3vh;
}
#bt-noticias{
    font-family: Arial;
    padding-left:10%;
    position:relative;
    background:white;
    width:90%;
    height:7.5%;
    align-items: center;
}
#noticias{
    padding-left:20%;
    position:relative;
    background:white;
    width:80%;
    /* height:15%; */
    align-items: center;
    transition: height 0.5s;
}
p{
    font-family:Arial;
}
.i-menu2{
    font-family: Arial;
    padding-left:10%;
    position:relative;
    background:white;
    width:90%;
    display:flex;
    align-items: center;
    height:50%;
    border-bottom:solid 1px rgba(100,100,100,0.2);
    border-radius:20px;
}
a{
    color:black;
    font-family:Arial;
    text-decoration: none;
}
.i-menu2:hover{
    background:rgba(100,100,100,0.2);
}
.fechado-noticia{
    height:0px;
}
.aberto-noticia{
    height:15%;
}
#v{
    margin-left:40%;
}
#n2-menu{
    position:absolute;
    background:white;
    width:80%;
    height:100%;
}
#n2-menu.fechado{
    display:none;
}
#n2-menu.aberto{
    display:block;
}
        </style>
    </head>
    <body>
        <a href="/"><img id="logo" src="../static/logo-anjoovi.png"></a>
        <div id="bt-menu">
            <div id="b1"></div>
            <div id="b2"></div>
            <div id="b3"></div>
        </div>
        <div id="c_menu" class="fechado">
            <div id="menu" class="fechado">
                <a href="/admin"><div class="i-menu-1 i-menu" id="inicio" >Ínicio</div></a>
                <div class="i-menu" id="bt-noticias"><p>Notícias</p><p id="v">^</p></div>
                <div class="n-menu fechado-noticia" id="noticias">
                    <div id="n2-menu" class="fechado">
                        <a href="/admin/noticias_cadastro"><div class="i-menu2" id="noticias_cadastro" >Cadastrar notícias</div></a>
                        <a href="/admin/noticias_lista"><div class="i-menu2" id="noticias_lista" >Listar notícias</div></a>
                    </div>
                </div>
                <a href="/admin/sair"><div class="i-menu" id="sair">Sair</div></a>
            </div>
        </div>
        <img id="lupa" src="../static/imagem-lupa.png">
        <script src="../static/index.js"></script>
        <script src="/admin_painel/cadastro_usuario.js"></script>
    </body>
</html>
