<html>
    <head>
        <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1, maximum-scale=1, user-scalable=no">
        <link rel="shortcut icon" href="/static/favicon.png" type="image/x-icon">
        <title>Anjoovi</title>
        <style>
.usuario-p{
    font-family: Arial;
    display:inline-block;
    font-size:120%;
}
#usuario-1{
    font-weight: bold;

}
#titulo{
    font-family: Arial;
    font-weight: 900;
    font-size:400%;
}
#subtitulo{
    font-family: Arial;
    font-size:120%;
}
img{
    position:absolute;
    background:white;
    display:none;
    width:100%;
}
#campo-img{
    position:absolute;
    width:50%;
    height:70%;
    top:30%;
    display:flex;
    justify-content: center;
}
#texto{
    font-family: Arial;
    font-size: 110%;
    position:absolute;
    width:48%;
    left:52%;
    height:70%;
    top:30%;
}
        </style>
    </head>
    <body>
        <div id="titulo"></div>
        <p id="subtitulo"></p>
        <div id="usuario">
            <p class="usuario-p" id="usuario-1">Por: </p><p class="usuario-p" id="usuario-t"></p>
        </div>
        <div id="campo-img">
        <img>
        </div>
        <div id="texto"></div>
        <script>
            console.log(window.post);
            document.querySelector("#titulo").textContent=window.post[0].titulo;
            document.querySelector("#subtitulo").textContent=window.post[0].subtitulo;
            document.querySelector("#usuario-t").textContent=window.post[0].usuario;
            var texto=document.querySelector("#texto");
            window.post[0].texto!="n" ? texto.innerHTML=window.post[0].texto : null;
            var imagem=document.querySelector("img");
            window.post[0].imagem!="n" ? (()=>{imagem.style.display="block";imagem.src="/images/"+window.post[0].imagem})() : null;
        </script>
    </body>
</html>
