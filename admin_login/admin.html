<html>
    <head>
        <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1, maximum-scale=1, user-scalable=no">
        <link rel="shortcut icon" href="/static/favicon.png" type="image/x-icon">
        <title>Anjoovi</title>
        <style>
html,body{
    margin:0px;
    width:100vw;
    height:100vh;
    background:#f0f0f0;
    display:flex;
    justify-content:center;
}
form{
    position:absolute;
    display:none;
    top:23%;
    background:white;
    width:25.6%;
    height:40%;
    border-radius:5px;
    box-shadow: 0.5px 0.5px 30px rgb(128, 128, 128,0.5);
}
#email,#senha{
    font-size:94%;
    padding-left:5%;
    position:relative;
    margin-top:4.5vh;
    margin-left:5%;
    width:90%;
    height:19%;
    border:solid 1.5px rgba(160,160,160,0.3);
    border-radius:0px;
    outline: 0px;
}
#senha{
    margin-top:1.4vh;
}
#email:focus, #senha:focus{
    outline:solid 1px black;
}
button{
    font-size:94%;
    position:relative;
    margin-top:2.5vh;
    margin-left:5%;
    width:90%;
    height:20%;
    background:black;
    color:white;
    border:solid 1px black;
    border-radius:5px;
}
button:hover{
    background:white;
    color:black;
}
img{
    position:absolute;
    display:none;
    left:43.75%;
    top:8%;
    width:12.5%;
    height:11.25%;
}
#a{
    position:relative;
    display:flex;
    justify-content: center;
    top:3vh;
    width:100%;
    height:10%;

}
a{
    font-family:Arial;
    font-size:78.25%;
    color:black;
    text-decoration: none;
}
a:hover{
    text-decoration:underline;
    text-decoration-color: black;
}
#message{
    display:none;
    padding-left:15px;
    padding-top:10px;
    font-size:47.5%;
    position:relative;
    left:5%;
    margin-top:3.5vh;
    width:calc(90% - 17px);
    height:15%;
    border:solid 1px red;
    background:pink;
}
h1{
    font-family: Arial;
    top:-20%;
    position:relative;
    color:red;
}
p{
    font-family: Arial;
    font-size:160%;
    font-weight: 100;
    top:-25%;
    position:relative;
    color:red;
}
        </style>
    </head>
    <body>
        <img src="../static/logo-anjoovi.png">
        <form action="" method="post">
            <div id="message">
                <h1>E-mail ou senha inválidos</h1>
                <p></p>
            </div>
            <input name="email" id="email" placeholder="E-mail" required>
            <input type="password" name="password" id="senha" placeholder="Senha" required>
            <button type="submit">Entrar</button>
            <div id="a"><a href="/pegar_senha">Esqueceu a senha?</a></div>
        </form>
        <script src="../static/admin.js"></script>
        <script src="https://code.jquery.com/jquery-3.6.3.min.js" integrity="sha256-pvPw+upLPUjgMXY0G+8O0xUf+/Im1MZjXxxgOcBQBXU=" crossorigin="anonymous"></script>
        <script src="../static/post.js"></script>
    </body>
</html>
